name: release

on:
  push:
    tags:
      - "v*"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

  build:
    runs-on: ubuntu-latest
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build release artifacts
        shell: bash
        run: |
          set -euo pipefail

          name="curlstress"
          version="${GITHUB_REF_NAME}"
          asset_base="${name}_${version}_${{ matrix.goos }}_${{ matrix.goarch }}"
          work_dir="$(mktemp -d)"
          target_dir="${work_dir}/${asset_base}"
          binary_name="${name}"
          binary_asset="dist/${asset_base}"

          if [[ "${{ matrix.goos }}" == "windows" ]]; then
            binary_name="${name}.exe"
            binary_asset="${binary_asset}.exe"
          fi

          mkdir -p dist "${target_dir}"
          GOOS="${{ matrix.goos }}" GOARCH="${{ matrix.goarch }}" CGO_ENABLED=0 \
            go build -trimpath -ldflags="-s -w" -o "${target_dir}/${binary_name}" .
          cp "${target_dir}/${binary_name}" "${binary_asset}"

          tar -C "${work_dir}" -czf "dist/${asset_base}.tar.gz" "$(basename "${target_dir}")"

          rm -rf "${work_dir}"

      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  publish:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: dist

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "${GITHUB_REF_NAME}" --repo "${GH_REPO}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" dist/* --clobber --repo "${GH_REPO}"
          else
            gh release create "${GITHUB_REF_NAME}" dist/* \
              --repo "${GH_REPO}" \
              --title "${GITHUB_REF_NAME}" \
              --generate-notes
          fi
