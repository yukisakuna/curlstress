name: release

on:
  push:
    tags:
      - "v*"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

  build:
    runs-on: ubuntu-latest
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build archive
        shell: bash
        run: |
          set -euo pipefail

          name="curlstress"
          version="${GITHUB_REF_NAME}"
          target_dir="dist/${name}_${version}_${{ matrix.goos }}_${{ matrix.goarch }}"
          binary_name="${name}"

          if [[ "${{ matrix.goos }}" == "windows" ]]; then
            binary_name="${name}.exe"
          fi

          mkdir -p "${target_dir}"
          GOOS="${{ matrix.goos }}" GOARCH="${{ matrix.goarch }}" CGO_ENABLED=0 \
            go build -trimpath -ldflags="-s -w" -o "${target_dir}/${binary_name}" .

          if [[ "${{ matrix.goos }}" == "windows" ]]; then
            (
              cd dist
              zip -rq "${name}_${version}_${{ matrix.goos }}_${{ matrix.goarch }}.zip" "$(basename "${target_dir}")"
            )
          else
            tar -C dist -czf "dist/${name}_${version}_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz" "$(basename "${target_dir}")"
          fi

          rm -rf "${target_dir}"

      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/*.zip

  publish:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: dist

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" dist/* --clobber
          else
            gh release create "${GITHUB_REF_NAME}" dist/* \
              --title "${GITHUB_REF_NAME}" \
              --generate-notes
          fi
